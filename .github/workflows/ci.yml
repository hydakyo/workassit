name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Lint with Ruff
      run: |
        ruff check .
        
    - name: Type check with Mypy
      run: |
        mypy app main.py
        
    - name: Run unit tests
      run: |
        pytest

    - name: Build Windows package
      run: |
        python scripts/build.py
        if (-not (Test-Path "dist/ProjectOS/_internal/web/index.html")) { throw "Bundled frontend asset is missing" }
        if (-not (Test-Path "dist/ProjectOS/_internal/app/templates/default.json")) { throw "Bundled template asset is missing" }

    - name: Upload Windows package
      uses: actions/upload-artifact@v4
      with:
        name: ProjectOS-windows
        path: dist/ProjectOS
